    get_library_eos_data:
      name: get_library_eos_data
      input:
        script: "import { eventsClient } from\n'@dynatrace-sdk/client-classic-environment-v2';\n\
          \nimport { queryExecutionClient } from \"@dynatrace-sdk/client-query\";\n\
          \    \n\n//--------------------------------- ↓ Utilities for refreshing\
          \ OS data ↓ ---------------------------------\n\nlet eolTechnologies;\n\
          //--------------------------------- ↓ Utilities for refreshing library data\
          \ ↓ ---------------------------------\n\nconst typePackageManagerMap = {\n\
          \  'DOTNET': 'NUGET',\n  'NODE_JS': 'NPM',\n  'JAVA': 'MAVEN',\n  'GO':\
          \ 'GO'\n}\n\n//--------------------------------- ↓ Only modify the code\
          \ section below if you fully understand how the workflow's code and dashboard's\
          \ DQL are working together ↓ ---------------------------------\n\n\n\nasync\
          \ function getFreshLibraryData(packageManager, library, version) {\n  let\
          \ data;\n  let releases;\n  // Try to retrieve the list of know releases\
          \ for that library. If response is not JSON/empty, it will stop the processing\
          \ of that library version\n  try {\n    releases = await fetch(`https://api.deps.dev/v3/systems/${packageManager}/packages/${encodeURIComponent(library)}`).then((response)\
          \ => response.json());\n  } catch(e) {\n    console.error(`No releases data\
          \ found for ${library}:${version}`);\n  }\n  if(releases && releases.versions\
          \ && releases.versions.filter(e => e.isDefault === true)[0]) {\n    // console.log(releases);\n\
          \    data = {\n      packageManager: packageManager,\n      library: library,\n\
          \      currentVersion: version,\n      key: `${library}:${version}`\n  \
          \  };\n    if(releases && releases.versions && releases.versions.filter(e\
          \ => e.isDefault === true)[0].versionKey.version) data.latestStableVersion\
          \ = releases.versions.filter(e => e.isDefault === true)[0].versionKey.version;\n\
          \    if(releases && releases.versions && releases.versions.filter(e => e.isDefault\
          \ === true)[0].publishedAt) data.latestStableVersionPublishedAt = releases.versions.filter(e\
          \ => e.isDefault === true)[0].publishedAt;\n    try {\n      const versionDetails\
          \ = await fetch(`https://api.deps.dev/v3/systems/${packageManager}/packages/${encodeURIComponent(library)}/versions/${version}`).then((response)\
          \ => response.json());\n      // console.log(versionDetails);\n      if(versionDetails\
          \ && versionDetails.publishedAt) data.currentVersionPublishedAt = versionDetails.publishedAt;\n\
          \      if(versionDetails && versionDetails.links && versionDetails.links.filter(e\
          \ => e.label === 'ORIGIN')[0]) data.link = versionDetails.links.filter(e\
          \ => e.label === 'ORIGIN')[0].url;\n      if(versionDetails && versionDetails.licenses\
          \ && versionDetails.licenses.length > 0) data.licenses = versionDetails.licenses.join(',\
          \ ');\n    } catch(e) {\n    console.log(`No version details found for ${library}:${version}`);\n\
          \    }\n    return data;\n  }\n}\n\nasync function refreshLibraryData()\
          \ {\n  //--------------------------------- ↓ Refresh Library data ↓ ---------------------------------\n\
          \  try {\n    let softwareComponents = [];\n    try {\n      let res = await\
          \ queryExecutionClient.queryExecute({\n        body: {\n          query:\
          \ 'fetch dt.entity.software_component, from: -15m | fieldsAdd softwareComponentFileName,\
          \ softwareObsolescenceManagement = entity.name | fieldsAdd lastColonIndex\
          \ = lastIndexOf(entity.name, \":\") | fieldsAdd Type = softwareComponentType\
          \ | fieldsAdd Library = substring(entity.name, to:lastColonIndex) | fieldsAdd\
          \ Version = softwareComponentVersion | fieldsAdd result = lookup([ fetch\
          \ events, from: -7d | filter dt.system.bucket == \"default_davis_custom_events\"\
          \ | filter event.name == \"software-obsolescence-management.library-info\"\
          \ ], sourceField:entity.name, lookupField:key ) | fieldsFlatten result,\
          \ prefix:\"event.\" | filter isNull(event.timestamp) | summarize by:{Type,\
          \ Library, Version, entity.name}, count = count() | fieldsAdd random = \
          \ random() | sort random ASC | fields Type, Library, Version, entity.name\
          \ | limit 60'\n        }\n      });\n      // console.log(res);\n      res\
          \ = await queryExecutionClient.queryPoll({\n        requestToken: res.requestToken,\n\
          \        requestTimeoutMilliseconds: 60000\n      });\n      if(res.result\
          \ && res.result.records) {\n        console.log(\"Software components pulled\
          \ successfully.\");\n        softwareComponents = res.result.records;\n\
          \      } else {\n        throw Error(`DQL query timed out`);\n      }\n\
          \    } catch (error) {\n      console.error(\"Error while pulling software\
          \ components:\", error);\n      throw error;\n    }\n    // console.log(softwareComponents);\n\
          \    for(let softwareComponent of softwareComponents) {\n      const libraryData\
          \ = await getFreshLibraryData(typePackageManagerMap[softwareComponent.Type],\
          \ softwareComponent.Library, softwareComponent.Version);\n      if(libraryData)\
          \ {\n        console.log(`Library data pulled successfully for ${softwareComponent['entity.name']}`);\n\
          \        const event = {\n          title: \"software-obsolescence-management.library-info\"\
          ,\n          eventType: \"CUSTOM_INFO\",\n          properties: libraryData\n\
          \        };\n        // console.log(event);\n        try {\n          await\
          \ eventsClient.createEvent({\n            body: event,\n          });\n\
          \          console.log(\"Event ingested successfully\");\n          // console.log(event);\n\
          \        } catch (error) {\n          console.error(\"Error ingesting event:\"\
          , error);\n          // console.error(event);\n        }\n      } else {\n\
          \        console.error(`No library data found for ${softwareComponent['entity.name']}`);\n\
          \      }\n    }\n  } catch(e) {\n    console.log(e);\n  }\n}\n\n\nexport\
          \ default async function ({ execution_id }) {\n  const configGet = await\
          \ fetch(`/platform/automation/v1/executions/${execution_id}/tasks/config/result`);\n\
          \  const configBody = await configGet.json();\n  const alertThresholds =\
          \ configBody['alertThresholds'];\n  console.log(alertThresholds);\n  const\
          \ alertManagementZoneRestrictions = configBody['alertManagementZoneRestrictions'];\n\
          \  const alertTagRestrictions = configBody['alertTagRestrictions'];\n  const\
          \ supportOverrides = configBody['supportOverrides'];\n\n  refreshLibraryData();\n\
          \  console.log(`Refreshing Library Data...`);\n}"
      action: dynatrace.automations:run-javascript
      position:
        x: -1
        y: 2
      conditions:
        states:
          config: OK
      description: Run custom JavaScript code.
      predecessors:
      - config
    get_technology_eos_data:
      name: get_technology_eos_data
      input:
        script: "import { eventsClient } from\n'@dynatrace-sdk/client-classic-environment-v2';\n\
          \nimport { queryExecutionClient } from \"@dynatrace-sdk/client-query\";\n\
          \    \n//--------------------------------- ↓ Utilities for refreshing OS\
          \ data ↓ ---------------------------------\n\nlet eolTechnologies;\n\n//---------------------------------\
          \ ↓ Utilities for refreshing Technology data ↓ ---------------------------------\n\
          \nconst technologyToProductSlugMap = {\n  'SPRING': 'spring-boot',\n  'JAVA:Oracle\
          \ Corporation': 'oracle-jdk',\n  'JAVA:Red Hat, Inc.': 'redhat-build-of-openjdk',\n\
          \  'JAVA:Microsoft Corporation': 'microsoft-build-of-openjdk',\n  'JAVA':\
          \ 'openjdk-builds-from-oracle'\n};\n\n//---------------------------------\
          \ ↓ Only modify the code section below if you fully understand how the workflow's\
          \ code and dashboard's DQL are working together ↓ ---------------------------------\n\
          \n//--------------------------------- ↓ Raise proactive alerts ↓ ---------------------------------\n\
          \n\nasync function getFreshTechnologyData(technology, edition, version)\
          \ {\n  let data;\n  let matchedEolTechnologies = [];\n  // Match the relevant\
          \ entries from technologyToProductSlugMap based on the input technology\
          \ and edition data\n  let technologyToProductSlugMapMatches = Object.keys(technologyToProductSlugMap).filter(e\
          \ => `${technology}:${edition}`.startsWith(e));\n  // Sort matches by longest\
          \ identifier (technology + edition vs only technology) first, which is considered\
          \ a basic proxy to relevance\n  technologyToProductSlugMapMatches.sort(function\
          \ (a, b) {\n    if (a.length < b.length) {\n      return 1;\n    }\n   \
          \ if (a.length > b.length) {\n      return -1;\n    }\n    return 0;\n \
          \ });\n  // console.log(technologyToProductSlugMapMatches);\n  eolTechnologies.forEach(eolTechnology\
          \ => {\n    let score = 0;\n    // Add points thanks to the manual technologyToProductSlugMap\n\
          \      if(technologyToProductSlugMapMatches[0] && (technologyToProductSlugMap[technologyToProductSlugMapMatches[0]]\
          \ === eolTechnology.slug)) score = score + 10;\n    // Scoring based on\
          \ product slug versus technology\n    if(technology.toLowerCase().match(/[a-z]+/g).join('')\
          \ === eolTechnology.slug.match(/[a-z]+/g).join('')) score = score + 10;\n\
          \    eolTechnology.slug.split('-').forEach(eolTechSlugSection => {\n   \
          \   if(eolTechSlugSection.length > 1) {\n        if(technology.toLowerCase().includes(eolTechSlugSection))\
          \ score++;\n        if(technology.toLowerCase().includes(eolTechSlugSection)\
          \ && eolTechnology.slug.split('-').length === 1 && eolTechnologies.filter(e\
          \ => e.slug.includes(eolTechSlugSection)).length < 3) score++;\n      }\n\
          \    });\n    // Scoring based on product name versus technology\n    if(eolTechnology.name\
          \ && technology.toLowerCase().match(/[a-z]+/g).join('') === eolTechnology.name.toLowerCase().match(/[a-z]+/g).join(''))\
          \ score = score + 10;\n    if(eolTechnology.name) {\n      eolTechnology.name.split('\
          \ ').forEach(eolTechNameSection => {\n        eolTechNameSection = eolTechNameSection.toLowerCase();\n\
          \        if(eolTechNameSection.length > 1 && eolTechNameSection !== 'from')\
          \ {\n          if(technology.toLowerCase().includes(eolTechNameSection))\
          \ score++;\n          if(technology.toLowerCase().includes(eolTechNameSection)\
          \ && eolTechnology.name.split(' ').length === 1 && eolTechnologies.filter(e\
          \ => e.name && e.name.toLowerCase().includes(eolTechNameSection)).length\
          \ < 3) score++;\n        }\n      });\n    }\n    if(score > 2) {\n    \
          \  matchedEolTechnologies.push({\n        product: eolTechnology.slug,\n\
          \        score: score\n      });\n    }\n  });\n  matchedEolTechnologies.sort(function\
          \ (a, b) {\n    if (a.score < b.score) {\n      return 1;\n    }\n    if\
          \ (a.score > b.score) {\n      return -1;\n    }\n    return 0;\n  });\n\
          \  // console.log(matchedEolTechnologies);\n  if(matchedEolTechnologies[0])\
          \ {\n    try {\n      const apiResponse = await fetch(`https://endoflife.date/api/${matchedEolTechnologies[0].product}.json`).then((response)\
          \ => response.json());\n      const cycles = apiResponse.result ? apiResponse.result.releases\
          \ : apiResponse;\n      if(!cycles || cycles.length === 0) throw Error(`Invalid\
          \ endoflife.date API response`);\n      data = {\n          technology:\
          \ technology,\n          edition: edition,\n          currentVersion: version,\n\
          \          key: `${technology}:${edition}:${version}`,\n          latestVersion:\
          \ cycles[0].latest && cycles[0].latest.name ? cycles[0].latest.name : cycles[0].latest,\n\
          \          latestVersionPublishedAt: cycles[0].latest && cycles[0].latest.date\
          \ ? cycles[0].latest.date : cycles[0].latestReleaseDate,\n          link:\
          \ cycles[0].latest && cycles[0].latest.link ? cycles[0].latest.link : cycles[0].link\n\
          \        };\n      version = version.match(/\\b\\d+(\\.\\d+)*\\b/g) ? version.match(/\\\
          b\\d+(\\.\\d+)*\\b/g)[0] : null; // Extrat the build number (digits and\
          \ dots) from any string that could be prefixed by tags or product name;\
          \ Defaults to its original value.\n      if(version) {\n        console.log(parseInt(version));\n\
          \        console.log(parseInt(data.latestVersion));\n        if(parseInt(version)\
          \ > parseInt(data.latestVersion)) {\n          data = null;\n          console.warn(`Warning:\
          \ The latest release of the retrieved EOL product is lower than the detected\
          \ technology's current version`);\n        }\n        if(data !== null)\
          \ {\n          const candidateCycles = cycles.filter(e => version.substring(0,\
          \ (e.name || e.cycle).length) === (e.name || e.cycle));\n          if(candidateCycles.length\
          \ > 0) {\n            candidateCycles.sort(function (a, b) {\n         \
          \     const aLen = (a.name || a.cycle).length;\n              const bLen\
          \ = (b.name || b.cycle).length;\n              if (aLen < bLen) {\n    \
          \            return 1;\n              }\n              if (aLen > bLen)\
          \ {\n                return -1;\n              }\n              return 0;\n\
          \            });\n            const matched = candidateCycles[0];\n    \
          \        data.currentCycle = matched.name || matched.cycle;\n          \
          \  data.currentCyclePublishedAt = matched.releaseDate;\n            data.lts\
          \ = matched.isLts !== undefined ? matched.isLts : matched.lts;\n       \
          \     data.eol = matched.eolFrom || matched.eol;\n          }\n        }\n\
          \      }\n    } catch(e) {\n      console.log(e);\n    }\n  }\n  return\
          \ data;\n}\n\n//--------------------------------- ↓ Utilities for refreshing\
          \ library data ↓ ---------------------------------\n\n\nasync function refreshTechnologyData()\
          \ {\n  //--------------------------------- ↓ Refresh Technology data ↓ ---------------------------------\n\
          \  try {\n    let detectedTechnologies = [];\n    // Download the full list\
          \ of EOL product slugs\n    eolTechnologies = await fetch('https://endoflife.date/api/all.json').then((response)\
          \ => response.json());\n    eolTechnologies = eolTechnologies.map(e => {\n\
          \      return { slug: e };\n    });\n    // Try to augment them with the\
          \ corresponding product name, scraping the homepage's navigation menu (product\
          \ name is not available via API)\n    try {\n      let homepageHtml = await\
          \ fetch('https://endoflife.date').then((response) => response.text());\n\
          \      const regex = /<a href=\"\\/([^\"]+)\" class=\"nav-list-link\">([^<]+)<\\\
          /a>/g;\n      const productMap = [];\n      for (const match of homepageHtml.matchAll(regex))\
          \ {\n        if(!match[1].includes('/')) productMap.push({ slug: match[1],\
          \ name: match[2] }); // Filter category links out\n      }\n      // console.log(productMap);\n\
          \      eolTechnologies.forEach(e => {\n        try {\n          e.name =\
          \ productMap.filter(el => el.slug === e.slug)[0].name;        \n       \
          \ } catch(error) {}\n      });\n    } catch(e) {\n      console.log(`Error\
          \ while trying to augment the technology slugs by their corresponding product\
          \ name`);\n    }\n    // console.log(eolTechnologies);\n    try {\n    \
          \  let res = await queryExecutionClient.queryExecute({\n        body: {\n\
          \          query: `fetch dt.entity.process_group_instance, from: -15m |\
          \ fieldsRename Process = entity.name | fieldsAdd softwareTechnologies, softwareObsolescenceManagement\
          \ = Process | expand softwareTechnologies | parse softwareTechnologies,\
          \ \"'type:' LD:Technology ',edition:' LD:Edition ',version:' LD:Version\"\
          \ | fields Technology, Edition, Version | filter isNotNull(Technology) AND\
          \ Technology != \"null\" | fieldsAdd key = concat(Technology, \":\", Edition,\
          \ \":\", Version) | fieldsAdd result = lookup([ fetch events, from: -7d\
          \ | filter dt.system.bucket == \"default_davis_custom_events\" | filter\
          \ event.name == \"software-obsolescence-management.technology-info\" ],\
          \ sourceField:key, lookupField:key ) | fieldsFlatten result, prefix:\"event.\"\
          \ | filter isNull(event.timestamp) | summarize by:{Technology, Edition,\
          \ Version, key}, count = count() | fieldsAdd random =  random() | sort random\
          \ ASC | fields Technology, Edition, Version, key | limit 60`\n        }\n\
          \      });\n      // console.log(res);\n      res = await queryExecutionClient.queryPoll({\n\
          \        requestToken: res.requestToken,\n        requestTimeoutMilliseconds:\
          \ 60000\n      });\n      if(res.result && res.result.records) {\n     \
          \   console.log(\"Detected technologies pulled successfully.\");\n     \
          \   detectedTechnologies = res.result.records;\n      } else {\n       \
          \ throw Error(`DQL query timed out`);\n      }\n    } catch (error) {\n\
          \      console.error(\"Error while pulling detected technologies:\", error);\n\
          \      throw error;\n    }\n    for(let detectedTechnology of detectedTechnologies.slice(0,\
          \ 60)) {\n      // console.log(detectedTechnology);\n      const technologyData\
          \ = await getFreshTechnologyData(detectedTechnology.Technology, detectedTechnology.Edition,\
          \ detectedTechnology.Version);\n      if(technologyData) {\n        console.log(`Technology\
          \ data pulled successfully for ${detectedTechnology.key}`);\n        const\
          \ event = {\n          title: \"software-obsolescence-management.technology-info\"\
          ,\n          eventType: \"CUSTOM_INFO\",\n          properties: technologyData\n\
          \        };\n        try {\n          await eventsClient.createEvent({\n\
          \            body: event,\n          });\n          console.log(\"Event\
          \ ingested successfully\");\n          // console.log(event);\n        }\
          \ catch (error) {\n          console.error(\"Error ingesting event\");\n\
          \          // console.error(event);\n        }\n      } else {\n       \
          \ console.error(`No technology data found for ${detectedTechnology.key}`);\n\
          \      }\n    }\n  } catch(e) {\n    console.log(e);\n  }\n}\n\n\n\nexport\
          \ default async function ({ execution_id }) {\n  const configGet = await\
          \ fetch(`/platform/automation/v1/executions/${execution_id}/tasks/config/result`);\n\
          \  const configBody = await configGet.json();\n  const alertThresholds =\
          \ configBody['alertThresholds'];\n  console.log(alertThresholds);\n  const\
          \ alertManagementZoneRestrictions = configBody['alertManagementZoneRestrictions'];\n\
          \  const alertTagRestrictions = configBody['alertTagRestrictions'];\n  const\
          \ supportOverrides = configBody['supportOverrides'];\n  \n  refreshTechnologyData();\n\
          \  console.log(`Refreshing Technology Data...`);\n}"
      action: dynatrace.automations:run-javascript
      position:
        x: 1
        y: 2
      conditions:
        states:
          config: OK
      description: Run custom JavaScript code.
      predecessors:
      - config
